name: Deploy

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Scrape"]
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.TOKEN }}
          command: pages deploy dist/ --project-name=token-pseo

      - name: Trigger next scrape cycle
        if: ${{ github.event.workflow_run.event == 'schedule' }}
        run: gh workflow run scrape.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
